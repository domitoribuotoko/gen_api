          type: integer
          description: Для самозанятых
          example: 10000
        staffMember:
          type: integer
          description: Для штатных
          example: 12000
      description: Стоимость работ
    auth_register_body:
      required:
        - data
        - photo1
        - photo2
        - photo3
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RegisterRequest'
        photo1:
          type: string
          description: "Фотография №1: Селфи"
          format: binary
        photo2:
          type: string
          description: "Фотография №2: Первый разворот паспорта"
          format: binary
        photo3:
          type: string
          description: "Фотография №3: Второй разворот паспорта"
          format: binary
    user_photo_body:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          example: 10000000-0000-0000-0000-000000000000
        photo:
          type: string
          description: Новая фотография
          format: binary
    request_signManual_body:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SignManualRequest'
