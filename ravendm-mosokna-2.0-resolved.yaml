          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        description:
          type: string
          description: Текст описания
          example: Сборка и монтаж изделий
        hasPhoto:
          type: boolean
          description: Загружено ли фото (???)
          example: false
      description: Пункт объёма работ
    LocationInfo:
      required:
        - lat
        - lng
