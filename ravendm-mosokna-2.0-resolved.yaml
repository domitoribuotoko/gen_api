openapi: 3.0.0
info:
  title: mosokna
  description: Документация приложения Мосокна
  version: "2.0"
servers:
  - url: http://localhost:3000
security:
  - AuthHeader: []
tags:
  - name: auth
    description: "Методы, работающие без авторизации"
  - name: user
    description: "Методы, отностящиеся к ЛК"
  - name: request
    description: Методы для работы с заявками
  - name: logger
    description: Методы работы с логом событий
paths:
  /auth/token:
    post:
      tags:
        - auth
      summary: Обновление токена авторизации
      operationId: token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /auth/login:
    post:
      tags:
        - auth
      summary: Авторизация
      operationId: auth
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AuthPhoneRequest'
                - $ref: '#/components/schemas/AuthCodeRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TransactionResponse'
                  - $ref: '#/components/schemas/NewUserResponse'
                  - $ref: '#/components/schemas/RefreshTokenResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /auth/register:
    post:
      tags:
        - auth
      summary: Регистрация пользователя
      operationId: register
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/auth_register_body'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/status:
    post:
      tags:
        - user
      summary: "Пользователь: Проверка статуса"
      description: Вызывается при каждом запуске приложения для получения актуального статуса аккаунта пользователя
      operationId: userStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatusResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/info:
    post:
      tags:
        - user
      summary: "Пользователь: Получить данные"
      operationId: userInfo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/photo:
    post:
      tags:
        - user
      summary: "Пользователь: Изменить фото"
      operationId: changePhoto
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/user_photo_body'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/notifications:
    post:
      tags:
        - user
      summary: "Пользователь: Уведомления"
      operationId: userNotifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserNotificationsRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotificationResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/calendar:
    post:
      tags:
        - user
      summary: "Календарь: получение дат"
      description: нужен ли фильтр по месяцу (?)
      operationId: calendar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCalendarResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/editCalendar:
    post:
      tags:
        - user
      summary: "Календарь: обновление дат"
      operationId: editCalendar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEditCalendarRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /user/operations:
    post:
      tags:
        - user
      summary: "Пользователь: История операций"
      operationId: userOperations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserOperationRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOperationResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/list:
    post:
      tags:
        - request
      summary: Список заявок
      operationId: requestList
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestsListResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/details:
    post:
      tags:
        - request
      summary: "Заявка: детали"
      operationId: requestDetails
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetailsResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/changeStatus:
    post:
      tags:
        - request
      summary: "Заявка: смена статуса"
      operationId: requestChangeStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeStatusRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/cancel:
    post:
      tags:
        - request
      summary: "Заявка: Отказ"
      operationId: requestCancel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCancelRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/late:
    post:
      tags:
        - request
      summary: "Заявка: Опаздываю"
      operationId: requestLate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/problem:
    post:
      tags:
        - request
      summary: "Заявка: Проблема"
      operationId: requestProblem
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProblemRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/signManual:
    post:
      tags:
        - request
      summary: "Заявка: Подпись ручная"
      operationId: requestSignManual
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/request_signManual_body'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/signSms:
    post:
      tags:
        - request
      summary: "Заявка: Подпись через смс"
      description: |
        * Первый этап - номер телефона * Второй этап - остальные поля
      operationId: requestSignSms
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/SignSmsPhoneRequest'
                - $ref: '#/components/schemas/SignSmsCodeRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/uploadPhoto:
    post:
      tags:
        - request
      summary: "Заявка: Выгрузить фото"
      operationId: uploadPhoto
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/request_uploadPhoto_body'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
      security:
        - AuthHeader: []
  /request/mountingInfo:
    post:
      tags:
        - request
      summary: "Заявка: Запрос доп. документов"
      description: |
        Замерный лист и Комплектация приходят в виде эл. письма на Email, указанный в профиле   Регламент открывается в браузере сразу
      operationId: mountingInfo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MountingInfoRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UrlResponse'
        "401":
          description: Unaithorized
      security:
        - AuthHeader: []
  /request/qrCode:
    post:
      tags:
        - request
      summary: "Заявка: QR-код для оплаты"
      description: |
        Запрос ссылки на QR-код для оплаты.   QR код отображается в виде картинки на отдельном экране.
      operationId: qrCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UrlResponse'
        "401":
          description: Unaithorized
      security:
        - AuthHeader: []
  /logger/write:
    post:
      tags:
        - logger
      summary: Выгрузка лога действий пользователя в приложении
      description: |
        Через данный метод будет выгружаться список действий пользователя в приложении. Это бывает полезно для разрешения спорных ситуаций.
      operationId: logger
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoggerRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "401":
          description: Unaithorized
      security:
        - AuthHeader: []
components:
  schemas:
    SuccessResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Признак успеха операции
          default: 0
    ErrorResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 100
        errorText:
          type: string
          description: Текст описания ошибки (для показа в приложении)
          example: Неверный формат номера телефона
    RefreshTokenRequest:
      required:
        - refreshToken
        - sessionToken
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        refreshToken:
          type: string
          description: Токен восстановления
          format: uuid
          example: 20000000-0000-0000-0000-000000000000
      description: Обновление токена авторизации
    RefreshTokenResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          $ref: '#/components/schemas/TokensInfo'
      description: Обновление токена авторизации
    AuthPhoneRequest:
      required:
        - hash
        - mode
        - phone
      type: object
      properties:
        mode:
          type: string
          description: Режим работы - телефон
          default: phone
        phone:
          type: string
          description: Номер телефона пользователя
          format: string(12)
          example: "791112223344"
        hash:
          type: string
          description: |
            Контрольная хеш-сумма. Служит в качестве дополнительного слоя защиты,  т.к. метод работает без авторизации. Считается по алгоритму:
              * hash = MD5({phone}+{salt}), где
              * {phone} - значения паля 'phone'
              * {salt} - фиксированная фраза: u2yRR?z[2L
            При получении запроса, сервер должен проверить наличие хеша,  а также совпадение переданного хеша с аналогичным хешем, рассчитанным на основе  полей запроса.  Если они совпали - считаем запрос корректным и обрабатываем. Если нет - считаем запрос некорректным.
          example: cb2ea4319eb862b906465355bddbb3a4
      description: "Авторизация, 1я стадия"
    TransactionResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        transactionId:
          type: string
          description: Id транзакции (для передачи на 2м этапе)
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
      description: "Авторизация, 1я стадия. Уже существующий пользователь"
    NewUserResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        fillProfile:
          type: boolean
          description: Признак необходимости заполнить профиль (регистрации)
          default: true
      description: "Авторизация, 2я стадия. Новый пользователь"
    AuthCodeRequest:
      required:
        - code
        - hash
        - mode
        - transactionId
      type: object
      properties:
        mode:
          type: string
          description: Режим работы - код подтверждения
          default: code
        transactionId:
          type: string
          description: ID транзакции с 1го этапа авторизации
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        code:
          type: string
          description: Код подтверждения
          format: string
          example: "12345"
        hash:
          type: string
          description: "Контрольная хеш-сумма. Служит в качестве дополнительного слоя защиты,  т.к. метод работает без авторизации. Считается по алгоритму:\n  - **hash** = MD5(**{transactionId}**+**{code}**+**{salt}**), где\n  - **{transactionId}** - значения паля 'transactionId'\n  - **{code}** - значение поля 'code'\n  - **{salt}** - фиксированная фраза: u2yRR?z[2L\n  \nПри получении запроса, сервер должен проверить наличие хеша,  а также совпадение переданного хеша с аналогичным хешем, рассчитанным на основе  полей запроса.   Если они совпали - считаем запрос корректным и обрабатываем. Если нет - считаем запрос некорректным.              \n"
          example: c858d75a9310a4745b03233dc5ada4f0
      description: "Авторизации, 2я стадия"
    RegisterRequest:
      required:
        - accountNum
        - address
        - city
        - divisionCode
        - email
        - fio
        - inn
        - passportNum
        - passportSeries
        - phone
        - snils
        - transactionId
        - userType
      type: object
      properties:
        transactionId:
          type: string
          description: ID транзакции с 1го этапа авторизации
          format: uuid
          example: 00000000-0000-0000-0000-000000000000
        phone:
          type: string
          description: Номер телефона пользователя
          example: +7 (900) 000-00-00
        userType:
          type: string
          description: |
            Тип пользователя:
              - **ip** - ИП
              - **self** - Самозанятый
          example: ip
          enum:
            - ip
            - self
        fio:
          type: string
          description: ФИО
          example: Иванов Иван Иванович
        email:
          type: string
          description: E-mail
          example: email@mail.com
        city:
          type: string
          description: Город
          example: Саратов
        inn:
          pattern: "^\\d{10}$"
          type: string
          description: ИНН
          example: "1234567890"
        snils:
          pattern: "^\\d{11}$"
          type: string
          description: СНИЛС (для самозанытых)
          example: "12345678901"
        ogrnip:
          pattern: "^\\d{15}$"
          type: string
          description: ОГРНИП (для ИП)
          example: "123456789012345"
        accountNum:
          type: string
          description: Реквизиты счета
        passportSeries:
          pattern: "^\\d{4}$"
          type: string
          description: Серия паспорта
          example: "1234"
        passportNum:
          pattern: "^\\d{6}$"
          type: string
          description: Номер паспорта
          example: "123456"
        divisionCode:
          pattern: "^\\d{6}$"
          type: string
          description: Код выдавшего подразделения для паспорта
          example: "123456"
        address:
          type: string
          description: Адрес проживания
          example: "ул. Университетская, д. 1, кв. 2"
      description: "Регистрация, данные пользователя"
    BaseRequest:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
      description: Базовый запрос (с токеном авторизации)
    UserStatusResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          $ref: '#/components/schemas/UserStatus'
      description: Статус пользователя
    UserEditRequest:
      required:
        - email
        - fio
        - phone
        - sessionToken
        - specialization
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        fio:
          type: string
          description: ФИО
          example: Иванов Иван Иванович
        specialization:
          type: string
          description: Специализация
          example: Монтажник
        phone:
          type: string
          description: Телефон
          example: "79112223344"
        email:
          type: string
          description: E-mail
      description: Редактирование данных пользователя
    UserResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          $ref: '#/components/schemas/User'
      description: Данные пользователя
    UserEditCalendarRequest:
      required:
        - items
        - sessionToken
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        items:
          type: array
          items:
            $ref: '#/components/schemas/CalendarItem'
      description: Обновление данных календаря
    UserCalendarResponse:
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          type: array
          items:
            $ref: '#/components/schemas/CalendarItem'
      description: Данные календаря
    UserNotificationsRequest:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        fromId:
          type: string
          description: "Id операции, начиная с которой нужно делать выборку.   Используется для пагинации          \n"
          example: ""
    UserNotificationResponse:
      type: object
      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
      description: Уведомления
    UserOperationRequest:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
