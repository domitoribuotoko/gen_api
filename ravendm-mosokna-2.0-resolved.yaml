              - **pause** - Приостановать
              - **resume** - Возобновить
              - **close** - Закрыть
              - **finish** - Завершить
          example: start
          enum:
            - start
            - pause
            - resume
            - close
            - finish
        dateTime:
          type: string
          description: |
            Дата-время запроса (нажатия кнопки). Чтобы не потерялось при отложенной отправке
          format: datetime
          example: 31.12.2000 23:59
      description: Смена статуса заявки
    RequestCancelRequest:
      required:
        - causeId
        - dateTime
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        dateTime:
          type: string
          description: |
            Дата-время запроса (нажатия кнопки). Чтобы не потерялось при отложенной отправке
          format: datetime
          example: 31.12.2000 23:59
        causeId:
          type: string
          description: |
            Тип причины:
              - **car** - поломка машины
              - **ill** - болезнь
              - **incomplete** - незавершенность работ
              - **other** - другое
          example: other
          enum:
            - car
            - ill
            - incomplete
            - other
        comment:
          type: string
          description: Причина - комментарий
          example: Комментарий
      description: Отказ от заявки
    LateRequest:
      required:
        - causeId
        - dateTime
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        dateTime:
          type: string
          description: |
            Дата-время запроса (нажатия кнопки). Чтобы не потерялось при отложенной отправке
          format: datetime
          example: 31.12.2000 23:59
        causeId:
          type: string
          description: |
            Тип причины:
              - **prevWork** - задержка на предыдущем обьекте
              - **road** - задержка в дороге
              - **other** - другое
          example: other
          enum:
            - prevWork
            - road
            - other
        comment:
          type: string
          description: Причина - комментарий
          example: Комментарий
      description: Опаздание по заявке
    ProblemRequest:
      required:
        - dateTime
        - problemId
        - problemTypeId
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        problemId:
          type: string
          description: Уникальный ID проблемы (для привязки фотографий)
          format: uuid
          example: 20000000-0000-0000-0000-000000000000
        dateTime:
          type: string
          description: |
            Дата-время запроса (нажатия кнопки). Чтобы не потерялось при отложенной отправке
          format: datetime
          example: 31.12.2000 23:59
        problemTypeId:
          type: string
          description: |
            Тип проблемы:
              - **cantMount** - Невозможность установки изделия/изделий
              - **defectrivePart** - Наличие брака в изделии/изделиях
              - **missingPart** - Отсутствие изделия/изделий
              - **noTimeToFinish** - Непредвиденная задержка на объекте
          example: cantMount
          enum:
            - cantMount
            - defectrivePart
            - missingPart
            - noTimeToFinish
        comment:
          type: string
          description: Комментарий к проблеме
          example: ""
    SignManualRequest:
      required:
        - actTypeId
        - dateTime
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        actTypeId:
          type: string
          description: |
            Тип акта:
              - **accept** - Акт сдачи без замечаний
              - **acceptWComments** - Акт сдачи с замечанием
              - **cantStart** - Акт о невозможности начала работ
              - **cantContinue** - Акт о невозможности продолжения работ
              - **cantFinish** - Акт о невозможности сдачи работ
          example: accept
          enum:
            - accept
            - acceptWComments
            - cantStart
            - cantContinue
            - cantFinish
        comments:
          type: string
          description: Замечания
          example: ""
        dateTime:
          type: string
          description: |
            Дата-время получения подписи. Чтобы не потерялось при отложенной отправке
          format: datetime
          example: 31.12.2000 23:59
      description: Подпись ручная
    SignSmsPhoneRequest:
      required:
        - mode
        - phone
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        mode:
          type: string
          description: Режим работы - телефон
          default: phone
        phone:
          type: string
          description: Номер телефона
          example: "79112223344"
      description: "Подпись с помощью смс, 1й этап"
    SignSmsCodeRequest:
      required:
        - actTypeId
        - mode
        - sessionToken
        - smsCode
        - transactionId
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        mode:
          type: string
          description: Режим работы - код подтверждения
          default: code
        transactionId:
          type: string
          description: "ID транзакции, полученный на 1м этапе"
          example: "123456"
        smsCode:
          type: string
          description: Код подтверждения
          example: "123456"
        actTypeId:
          type: string
          description: |
            Тип акта:
              - **accept** - Акт сдачи без замечаний
              - **acceptWComments** - Акт сдачи с замечанием
              - **cantStart** - Ак о невозможности начала работ
              - **cantContinue** - Ак о невозможности продолжения работ
              - **cantFinish** - Ак о невозможности сдачи работ
          example: accept
          enum:
            - accept
            - acceptWComments
            - cantStart
            - cantContinue
            - cantFinish
        comments:
          type: string
          description: Замечания
          example: ""
      description: "Подпись с помощью смс, 2й этап"
    UploadPhotoRequest:
      required:
        - photoTypeId
        - sessionToken
        - workOrderId
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        photoTypeId:
          type: string
          description: |
            Тип фотографии:
              - **request** - фотоотчет (нет доп. параметров)
              - **taskItem** - пункт обьема работ (должен быть указан taskItemId)
              - **problem** - проблема (должен быть указан problemId)
          example: request
          enum:
            - request
            - taskItem
            - problem
        imageId:
          type: string
          description: Уникальный ID картинки
          format: uuid
        taskItemId:
          type: string
          description: Id пункта обьема работ
          example: ""
        problemId:
          type: string
          description: Id проблемы
          example: ""
      description: Информация о выгружаемой фотографии
    MountingInfoRequest:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        typeId:
          type: string
          description: "Тип запрашиваемой информации:\n  - **measureSheet** - замерный лист\n  - **orderConfig** - комплектация заказа\n  - **spec** - регламент монтажа            \n"
          enum:
            - measureSheet
            - orderConfig
            - spec
      description: Получение доп. данных о заявке
    UrlResponse:
      required:
