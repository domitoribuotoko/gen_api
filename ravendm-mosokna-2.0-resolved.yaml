          format: binary
    request_uploadPhoto_body:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UploadPhotoRequest'
        photo:
          type: string
          description: Фотография
          format: binary
    UrlResponse_result:
      type: object
      properties:
        url:
          type: string
          description: Ссылка на запрашиваемый документ/картинку
  securitySchemes:
    AuthHeader:
      type: apiKey
      description: Общий заголовок доступа к АПИ
      name: Authorization
      in: header
