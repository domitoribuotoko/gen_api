      properties:
        errorCode:
          type: integer
          description: Код ошибки
          example: 0
        errorText:
          type: string
          description: Описание ошибки
          example: ""
        result:
          $ref: '#/components/schemas/UrlResponse_result'
      description: Доп. данные для заявки
    LoggerRequest:
      required:
        - logs
        - sessionToken
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        logs:
          type: string
          description: |
            Лог событий пользователя в построчном виде: date|sessionId|message
          example: |
            30-08-2022T10:05:19+0300|sessionId|текст события1 30-08-2022T10:06:19+0300|sessionId|текст события2 30-08-2022T10:07:19+0300|sessionId|текст события3
      description: Выгрузка лога действий пользователя в приложении
    TokensInfo:
      type: object
      properties:
        sessionToken:
          type: string
          description: Токен пользователя
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        refreshToken:
          type: string
          description: Токен восстановления
          format: uuid
          example: 20000000-0000-0000-0000-000000000000
      description: Токены авторизации
    UserStatus:
      type: object
      properties:
        isBlocked:
          type: boolean
          description: |
            Признак блокировки аккаунта пользователя:
              - false - аккаунт не заблокирован
              - true - аккаунт заблокирован/удален, нужно обратиться в тех. поддержку для восстановления доступа
        isValidated:
          type: boolean
          description: "Признак прохождения ручной проверки данных после регистрации:\n  - false - аккаунт ожидает проверки, функционал ограничен \n  - true - аккаунт проверен и полностью активен\n"
        isCalendarFilled:
          type: boolean
          description: |
            Признак заполнения календаря:
              - false - для начала работы нужно заполнить календарь
              - true - календарь заполнен, можно работать
        comment:
          type: string
          description: |
            Примечание к статусу пользоваля,  отображается в UI приложения
      description: Данные о статусе пользователя
    User:
      required:
        - email
        - fio
        - phone
        - photoUrl
        - specialization
      type: object
      properties:
        fio:
          type: string
          description: ФИО
          example: Иванов Иван Иванович
        photoUrl:
          type: string
          description: Url фото
          example: https://ya.ru/test.png
        specialization:
          type: string
          description: Специализация
          example: Монтажник
        phone:
          type: string
          description: Телефон
          example: "79112223344"
        email:
          type: string
          description: E-mail
          example: mail@gmail.com
      description: Данные пользователя
    Notification:
      required:
        - id
        - message
        - type
      type: object
      properties:
        id:
          type: string
          example: "12345"
        type:
          type: string
          description: "Тип уведомления\n  - **normal** - обычное \n  - **important** - важное (красное)\n  - **info** - информация (зеленое)\n"
          example: normal
          enum:
            - normal
            - important
            - info
        message:
          type: string
          description: Текст уведомления
          example: Ваш отчет принят
        workOrderId:
          type: string
          description: Id заявки (если уведомление относится к ней)
          example: "12345"
      description: Уведомление
    CalendarItem:
      required:
        - date
      type: object
      properties:
        date:
          type: string
          description: Дата
          format: datetime
          example: 31.12.2000 23:59
      description: Элемент календаря
    Operation:
      required:
        - date
        - description
        - id
        - title
        - type
        - value
      type: object
      properties:
        id:
          type: string
          description: Уникальный Id операции
          format: uuid
          example: 10000000-0000-0000-0000-000000000000
        workOrderId:
          type: string
          description: Id заявки
          example: "12345"
        date:
          type: string
          description: Дата операции
          format: datetime
          example: 31.12.2000 23:59
        type:
          type: string
          description: |
            Тип операции:
              - **income** - поступление
              - **outcome** - списание
          example: income
          enum:
            - income
            - outcome
        title:
          type: string
          description: Название
          example: 'Зачисление средств '
        description:
          type: string
          description: Описание
          example: за Наряд № 1455610
        value:
          type: integer
          description: Сумма
          example: 15000
      description: Элемент истории операций
    RequestDetails:
      required:
        - address
        - clientComment
        - clientName
        - clientPhones
        - coordinatorPhone
        - createdDate
        - expectedStartDate
        - finishDate
        - jobDuration
        - jobPrice
        - location
        - minPhotosCount
        - minSignCount
        - orderId
        - sellarName
        - startDate
        - status
        - taskList
        - timeSpent
        - trademarkId
        - trademarkName
        - workNumber
        - workOrderId
        - workOrderNumber
      type: object
      properties:
        workOrderId:
          type: string
          description: Уникальный Id задания (для передачи в АПИ)
          example: "12345"
        createdDate:
          type: string
          description: Дата создания заявки
          format: datetime
          example: 01.01.2020 12:00
        expectedStartDate:
          type: string
          description: "Дата и время, к которому нужно приступить к работе"
          format: datetime
          example: 01.02.2020 12:00
        startDate:
          type: string
          description: Дата и время фактического начала работы
          example: 01.02.2020 13:00
        finishDate:
          type: string
          description: Дата завершения работы
          format: datetime
          example: ""
        workOrderNumber:
          type: string
          description: Номер задания (для отображения в UI)
          example: "200"
        orderNumber:
          type: string
          description: Номер заказа (в который входит текущее задание)
          example: "1234567"
        address:
          type: string
          description: Адрес
          example: "Университетская, д. 1, кв. 2"
        location:
          $ref: '#/components/schemas/LocationInfo'
        status:
          type: string
          description: |
            Статус заявки:
              - **new** - Новая
              - **process** - В работе
              - **pause** - На паузе
              - **finished** - Завершена
              - **verification** - На поверке
              - **payout** - Выплата
              - **paid** - Оплачено
              - **cancel** - Отмена оператором
          example: new
          enum:
            - new
            - process
            - pause
            - finished
            - verification
            - payout
            - paid
            - cancel
        timeSpent:
          type: integer
          description: Потраченное время (мин)
          example: 100
        clientComment:
          type: string
          description: Комментарии
          example: Обратить особое внимание на откосы
        clientName:
          type: string
          description: ФИО клиента
          example: Иванов Иван Иванович
        clientPhones:
          type: array
          description: Телефоны клиента
          items:
            type: string
            description: Телефон
            example: "79112223344"
        coordinatorPhone:
          type: string
          description: Телефон координатора
          example: "79112223344"
        taskList:
          type: array
          description: Список задач
          items:
            $ref: '#/components/schemas/RequestTaskItem'
        jobPrice:
          $ref: '#/components/schemas/JobPriceInfo'
        jobDuration:
          type: string
          description: Длительность работ
          example: 3ч
        minPhotosCount:
          type: integer
          description: Минимальное количество фотоочетов
          example: 5
        minSignCount:
          type: integer
          description: |
            Признак необходимости получить подпись заказчика: 0 - подпись уже получена 1 - подпись еще не получена
          example: 1
        trademarkName:
          type: string
          description: Наименование ТМ задания
          example: Rehau
        trademarkId:
          type: string
          description: Id ТМ задания для внутреннего пользования
          example: "100"
        sellarName:
          type: string
          description: Наименование продавца изделий в задании
          example: тд Дом
    RequestTaskItem:
      required:
