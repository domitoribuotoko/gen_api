        lat:
          type: number
          description: Latitude (1я геокоордината адреса)
          example: 51.5
        lng:
          type: number
          description: Longitude (2я геокоордината адреса)
          example: 45.99
      description: Геокоординаты адреса
    JobPriceInfo:
      required:
        - selfEmployed
        - staffMember
      type: object
      properties:
