openapi: 3.0.3
info:
  title: Ktg
  version: 1.1.0
  x-changelog:
    1.1.0: |
      Список баннеров в /banner
  description: |
    # Служебное 
    
    ## salt = OLF1Kpp!1Og6  (фиксированная строка)
    
    # Перечисляемые типы
    
    ## Уровни пользователя:
    **basic** - 1й уровень  
    **master** - 2й уровень  
    **pro** - 3й уровень  
    
    ## Статусы задания:
    **new** - новое (еще не принято пользователем, доступно для принятия).  
    **in_process** - в процессе (было принято пользователем).  
    **reviewing** - на проверке (было отправлено на модерацию).  
    **completed** - выполнено (подтверждено модератором после проверки).  
    **denied** - отклонено (отклонено модератором после проверки).  
    **outdated** - не выполнено в срок (было принято пользователем, но просрочен срок выполнения).  
    **appeal** - на апелляции (было оспорено пользователем после провального прохождении задания).  
    **unavailable** - заблокировано (данного статуса нет на бекенде. За данный статус отвечает флаг is_available в методе /tasks. Данный enum формируется на стороне мобильного приложения).
    
    ## Статусы апелляции:
    **forbidden** - нельзя отправить на апелляцию  
    **available** - можно отправить на апелляцию  
    **in_process** - уже на апелляции  
    **accepted** - апелляция одобрена  
    **denied** -  апелляция отклонена
    
    ## Статусы профиля:
    **unconfirmed** - не подтвержденный  
    **reviewing** - на проверке  
    **confirmed** - подтвержденный  
    **denied** - отклонено
    
    ## Типы заданий:
    **offers_photos** - сфотографировать ассортимент  
    **quiz** - задание с вопросами (Квиз)  
    **product_management** - управление продуктом  
    **survey** - опрос  
    **offers_scan** - отсканируйте ассортимент
    **with_choice** - с вариантами выполнения
    
    ## Типы уведомлений заданий и подзаданий(УП):
    **pm_task_results** - Уведомление о результате задания в УП   
    **welcome_to_quiz** - Необходимо выполнить обязательный квиз  
    **open_new_task** - Доступно новое задание  
    **task_completed** - Задание успешно выполнено     
    
    ## Типы сертификатов:  
    **old** - старые сертификаты от гифтери  
    **mir** - новые подключенные сертификаты сертификаты "Мир"  
    **upk** - новые подключенные сертификаты сертификаты "Универсальная подарочная карта" 
    
    ## Правила применения сертификатов:
    **no** - партнёр принимает только распечатанный сертификат,  
    **any** - партнёр может принять пару код/пин (или штрихкод) в торговой точке и в интернет-магазине,   
    **eshop** - партнёр может принять пару код/пин только в интернет-магазине,   
    **offline** - партнёр может принять пару код/пин только в торговой точке,   
    **exchange** - специальный признак Giftery Card - универсальной подарочной карты Giftery
    
    ## Статусы сертификатов:
    **new** - выполняется обработка заявки на выпуск на стороне гифтери  
    **issued** - сертификат выпущен  
    **canceled** - сертификат не был выпущен на стороне гифтери  
    
    ## Тип применения сертификата:
    **online** - сертификат можно использовать только онлайн (на стороне Giftery - eshop)  
    **offline** - сертификат можно использовать только офлайн (на стороне Giftery - no, offline)  
    **both** - сертификат можно использовать онлайн И офлайн (на стороне Giftery - any, exchange) 
    
    ## Тип действия из баннера:
    **none** - нет действий  
    **task** - переход на детали указанного задания  
    **news** - переход на детали указанной новости  
    **url** - открытие указанной ссылки во внешнем браузере  
    **webview** - открытие укзанной ссылки внутри МП в WebView  
    
    # Коды ошибок
    
    **0** - нет ошибок  
    **401** - ID сессии устарел (общее), неверный код (2й этап авторизации)  
    **410** - ваша версия приложения устарела, необходимо установить обновление  
    **500** - общая ошибка  
    **600-699** - Диапазон кодов ошибок для вывода текста с сервера  
    **601** - продукт уже отсканирован (при сканировании)  
    **602** - код продукта не подходит (при сканировании)  
    **603** - "Задание более недоступно" - если другой принял  
    **604** - "Задание закончилось" - если закончился срок действия  

security:
  - BearerAuth: [ ]
tags:
  - name: Auth
    description: 'Авторизация'
  - name: Service
    description: 'Сервисные методы'
  - name: Profile
    description: 'Профиль'
  - name: Main
    description: 'Главный экран'
  - name: Tasks
    description: 'Задания'
  - name: News
    description: 'Новости'
  - name: Certificate
    description: 'Сертификаты'
  - name: Achievements
    description: 'Достижения'
  - name: Notifications
    description: 'Уведомления'

