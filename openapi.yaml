      summary: 'Задания. Завершить задание'
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              properties:
                data:
                  oneOf:
                    - $ref: '#/components/schemas/CompleteTaskModel'
                    - $ref: '#/components/schemas/CompleteSurveyModel'
                    - $ref: '#/components/schemas/CompleteQuizWithFailsModel'
                    - $ref: '#/components/schemas/TaskIdRequest'
                stage_1[]:
                  type: array
                  description: 'Список файлов для 1го шага (*.png, *.jpg)'
                  items:
                    type: string
                stage_2[]:
                  type: array
                  description: 'Список файлов для 2го шага (*.png, *.jpg)'
                  items:
                    type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - $ref: '#/components/schemas/CompleteQuizWithFailsResponse'
