  /notifications:
    post:
      tags:
        - Notifications
      summary: 'Список уведомлений'
      description: |
        Выводит 20 уведомлений, начиная с указанного ID (если указан) или из начала списка.\
        Сортировка - от новых уведомлений к более старым.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationsRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NotificationsResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /view_notification:
    post:
      tags:
        - Notifications
      summary: 'Отмечает факт просмотра пользователем данного уведомления'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewNotificationRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    ErrorResponse:
      description: 'Базовый ответ ошибкой'
      properties:
        error_message:
          type: string
          nullable: true
          description: 'Текст ошибки для показа в приложении (при наличии)'
          example: 'Неверный формат номера телефона'
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 666
      required:
        - error_code

    BaseResponse:
      description: 'Базовый успешный ответ'
      properties:
        error_message:
          type: string
          nullable: true
          description: 'Текст ошибки, если она есть'
          example: ''
        error_code:
          type: integer
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
      required:
        - error_code

    AuthRequest:
      description: 'Запрос 1го этапа авторизации'
      properties:
        phone:
          type: string
          nullable: false
          description: 'Номер телефона'
          example: '71111111111'
        hash:
          type: string
          nullable: false
          description: |
            Контрольная хеш-сумма запроса \
            hash = MD5(phone + secure_key)
          example: '6e4e65b2ce76528f9b02d3b3c663b028'
      required:
        - phone
        - hash

    AuthResponse:
      description: 'Ответ 1го этапа авторизации'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        transaction_id:
          type: string
          nullable: false
          description: 'ID транзакции 1го этапа авторизации'
          example: '1111-2222-3333-4444'
      required:
        - transaction_id
        - error_code

    AuthCodeRequest:
      description: 'Запрос 2го этапа авторизации'
      properties:
        transaction_id:
          type: string
          nullable: false
          description: 'ID транзакции от 1го этапа авторизации'
          example: '1111-2222-3333-4444'
        code:
          type: string
          nullable: false
          description: 'Смс-код'
          example: '1234'
        hash:
          type: string
          nullable: false
          description: |
            Контрольная хеш-сумма запроса \
            hash = MD5(transactionId + code + secure_key)
          example: '6e4e65b2ce76528f9b02d3b3c663b028'
      required:
        - transaction_id
        - code
        - hash

    AuthCodeResponse:
      description: 'Ответ 2го этапа авторизации'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        transaction_id:
          type: string
          nullable: false
          description: 'ID транзакции 1го этапа авторизации'
          example: '1111-2222-3333-4444'
        user:
          $ref: '#/components/schemas/UserAuthModel'
      required:
        - error_code
        - transaction_id
        - user

    ProfileResponse:
      description: 'Ответ с данными профиля'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        data:
          $ref: '#/components/schemas/ProfileModel'
      required:
        - error_code
        - data

    BonusHistoryRequest:
      description: 'Запрос истории начислений'
      properties:
        type:
          type: string
          nullable: false
          description: 'Стринговая переменная, по которой мы делаем запрос coins или lights'
          example: 'coins'
        date_new:
          type: string
          nullable: false
          description: 'Дата последнего зачисления, для пагинации'
          example: '2023-04-14T16:40:24+03:00'
      required:
        - type
        - date_new

    BonusHistoryResponse:
      description: 'Ответ истории начислений'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        data:
          $ref: '#/components/schemas/BonusHistoryModel'
      required:
        - error_code
        - data

    DeviceInfoRequest:
      description: 'Запрос с данными об устройстве'
      properties:
        os:
          type: string
          nullable: false
          description: 'Тип операционной системы (ios/android)'
          example: 'ios'
        manufacturer:
          type: string
          nullable: false
          description: 'Производитель'
          example: 'Apple'
        brand:
          type: string
          nullable: false
          description: 'Бренд'
          example: 'iPhone'
        model:
          type: string
          nullable: false
          description: 'Название модели'
          example: 'iPhone 13'
        ram:
          type: number
          format: float
          nullable: false
          description: 'Объем оп. памяти, гб'
          example: 16.1
        screen:
          type: string
          nullable: false
          description: 'Разрешение экрана'
          example: '1920x1080'
        os_version:
          type: string
          nullable: false
          description: 'Версия ОС'
          example: '16.4'
        app_version:
          type: string
          nullable: false
          description: 'Версия приложения'
          example: '1.0.3 (50)'
        device_id:
          type: string
          nullable: false
          description: 'Уникальный ID устройства'
          example: '1111-2222-3333-4444'
      required:
        - os
        - manufacturer
        - brand
        - model
        - ram
        - screen
        - os_version
        - app_version
        - device_id

    CheckUpdatesRequest:
      description: 'Запрос проверки наличия обновлений'
      properties:
        os:
          type: string
          nullable: false
          description: 'Тип операционной системы (String ios/android)'
          example: 'ios'
        version:
          type: string
          nullable: false
          description: 'Версия приложения'
          example: '1.0.2'
        build:
          type: integer
          nullable: false
          description: 'Номер сборки приложения'
          example: 50
      required:
        - os
        - version
        - build

    CheckUpdatesResponse:
      description: 'Ответ проверки наличия обновлений'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        data:
          properties:
            has_updates:
              type: boolean
              nullable: false
              description: 'Признак наличия более новой версии приложения'
              example: true
            is_required:
              type: boolean
              nullable: false
              description: 'Признак обязательности обновления приложения'
              example: false
            whats_new:
              type: string
              nullable: false
              description: 'Текст с описанием Что нового, для показа в UI приложения'
              example: 'Добавлен новый тип заданий: Квизы'
          required:
            - has_updates
            - is_required
      required:
        - error_code
        - data

    BannerResponse:
      description: 'Информация о баннера, показываемом при запуске МП'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        items:
          type: array
          nullable: false
          description: 'Список баннеров для показа'
          items:
            $ref: '#/components/schemas/BannerModel'
      required:
        - error_code
        - data


    ViewBannerRequest:
      description: 'Данные о показанном баннере'
      properties:
        banner_id:
          type: string
          nullable: false
          description: 'ID баннера'
          example: '12345'
      required:
        - banner_id

    MainResponse:
      description: 'Данные для главного экрана'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        data:
          properties:
            name:
              type: string
              nullable: false
              description: 'Имя'
              example: 'Иван Петров'
            level:
              type: string
              nullable: false
              description: 'Уровень пользователя (enum)'
              example: 'basic'
            coins:
              type: integer
              nullable: false
              description: 'Монеты пользователя'
              example: 100
            lights:
              type: integer
              nullable: false
              description: 'Огоньки пользователя'
              example: 200
            next_level:
              type: integer
              nullable: false
              description: 'Количество огоньков для перехода на другой уровень'
              example: 300
            tasks:
              type: array
              description: 'Список заданий'
              items:
                $ref: '#/components/schemas/TaskModel'
            news:
              type: array
              description: 'Список новостей'
              items:
                $ref: '#/components/schemas/NewsModel'
          required:
            - name
            - level
            - coins
            - lights
            - next_level
            - tasks
            - news
      required:
        - error_code
        - data

    TasksListRequest:
      description: 'Запрос получения списка заданий (с пагинацией)'
      properties:
        from:
          type: string
          nullable: true
          description: 'ID задания, с которого выводить записи (для пагинации)'
