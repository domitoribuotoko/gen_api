    CheckLocationRequest:
      description: 'Запрос c данными геолокации для проверки'
      properties:
        task_id:
          type: integer
          nullable: false
          description: 'ID задания '
          example: 147
        lat:
          type: number
          format: float
          nullable: false
          description: 'Широта double'
          example: 54.05
        lng:
          type: number
          format: float
          nullable: false
          description: 'Долгота double'
          example: 46.11
        accuracy:
          type: number
          format: float
          nullable: false
          description: 'Точность double'
          example: 14.12
      required:
        - task_id
        - lat
        - lng
        - accuracy

    AcceptTaskRequest:
      description: 'Запрос с передачей ID задания'
      properties:
        task_id:
          type: integer
          nullable: false
          description: 'ID задания'
          example: 777
        difficulty_id:
          type: integer
          nullable: true
          description: 'ID выбранного кол-ва пачек'
          example: 1
      required:
        - task_id

    TasksListResponse:
      description: 'Список заданий'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
