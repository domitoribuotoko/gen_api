    TaskDetailsResponse:
      description: 'Датели задания'
      properties:
        error_code:
          type: number
          nullable: false
          description: 'Код ошибки (или 0 если ошибки нет)'
          example: 0
        data:
          properties:
            task_id:
              type: integer
              nullable: false
              description: 'Id задачи'
              example: 123
            status:
              type: string
              nullable: false
              description: 'Статус задания (enum)'
              example: 'new'
            is_status_repeat:
              type: boolean
              nullable: false
              description: 'Признак задания взятого на "Повтор"'
              example: true
            is_started:
              type: boolean
              nullable: false
              description: 'Признак начала работ по заданию'
              example: true
            can_repeat:
              type: boolean
              nullable: false
              description: 'Признак возможности взять задание на повторное выполнение после его отклонения'
              example: true
            task_type:
              type: string
              nullable: false
              description: 'Тип задания (enum)'
              example: 'quiz'
            appeal_status:
              type: string
              nullable: false
              description: 'Статус апелляции'
              example: 'available'
            can_choose_reward:
              type: boolean
              nullable: false
              description: 'Возможность выбирать награду'
              example: false
            show_notification:
              type: boolean
              nullable: true
              description: 'Показ уведомления для "Наличия продукта (product_management)" при completed, denied, в дальнейшем может где то еще будет использоваться'
            title:
              type: string
              nullable: false
              description: 'Название задачи'
