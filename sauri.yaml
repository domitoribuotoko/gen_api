                    description: текст о доставке (доставлен/не доставлен)
                    example: 'доставлен'
                required: [error,response]


components:
  schemas:

    #Модели запросов

    AuthLoginRequest:


    AuthPassEmailRecoverRequest:
      properties:
        email:
          type: string
          description: email пользователя
          example: 'example@mail.com'
        transactionId:
          type: string
          nullable: true
          description: ID транзакции для кода восстановления
          example: 'transaction_id'
        password:
          type: string
          nullable: true
          description: Код из письма
          example: '123456'
      required: [email]

    SessionIdRequest:
      properties:
        sessionId:
          type: string
          description: ID текущей сессии
          example: 'session_id'

    AuthChangePasswordRequest:
      allOf:
        - $ref: '#/components/schemas/SessionIdRequest'
      properties:
        transactionId:
          type: string
          description: ID транзакции для подписи
          example: 'transaction_id'
        smsCode:
          type: string
          description: Код из смс для подписи
          example: '123456'
        newPassword:
          type: string
          description: Новый пароль (>6)
          example: '12345678'
      required: [transactionId,smsCode,newPassword]

    UserUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SessionIdRequest'
      properties:
        userProps:
          type: object
          properties:
            name:
              type: string
              description: Имя
              example: 'Name'
            gender:
              allOf:
                - $ref: '#/components/schemas/Gender'
            birthday:
              allOf:
                - $ref: '#/components/schemas/BirthDay'
            city:
              allOf:
                - $ref: '#/components/schemas/City'
            email:
              allOf:
                - $ref: '#/components/schemas/Email'
              nullable: true
      required: [sessionId,userProps,name,gender,birthday,city]

    UserCreateRequest:
      properties:
        terminalId:
          allOf:
            - $ref: '#/components/schemas/TerminalId'
        login:
          type: string
          description: Номер телефона клиента для регистрации
          example: '8 937 810 19 08'
      required: [terminalId,login]

    UserCheckUpdatesRequest:
      properties:
        os:
          allOf:
            - $ref: '#/components/schemas/Os'
        version:
          allOf:
            - $ref: '#/components/schemas/Version'
        build:
          allOf:
            - $ref: '#/components/schemas/Build'
      required: [os,version,build]

    UserApplyPromocodeRequest:
      allOf:
        - $ref: '#/components/schemas/SessionIdRequest'
      properties:
        cityId:
          allOf:
            - $ref: '#/components/schemas/CityId'
        cafeId:
          type: string
          description: Кафе
          example: 'DST'
        code:
          type: string
          description: Промокод
          example: 'promocodeSauri'
        summa:
          type: string
          description: Сумма заказа
          example: '1000'
        deliveryMethod:
          type: string
          description: Способ доставки, pickup/courier
          example: 'courier'
        offersList:
          type: array
          items:
            properties:
              offerId:
                allOf:
                  - $ref: '#/components/schemas/OfferId'
              count:
                allOf:
                  - $ref: '#/components/schemas/Count'
              mods:
                type: string
                description: Модификаторы товара
                example: 'mod'
            required: [offerId,count,mods]
      required: [sessionId,cityId,cafeId,code,summa,deliveryMethod,offersList]

    UserUpdateNotificationStatusRequest:
      properties:
        appUserId:
          type: string
          description: Уникальный ID устройства
          example: 'uniqId'
        status:
          type: boolean
          example: true
      required: [appUserId,status]

    AddressUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SessionIdRequest'
      properties:
        addressId:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/AddressId'
        addressProps:
          allOf:
            - $ref: '#/components/schemas/AddressData'
      required: [sessionId,addressProps]

    OrderUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/OrderUpdateApproveData'
      properties:
        clientPhone:
          type: string
          nullable: true
          description: Контактный номер телефона клиента для текущего заказа
          example: '89378101908'
        discount:
          allOf:
            - $ref: '#/components/schemas/Discount'

      required: [terminalId, orderId]

    OrderApproveRequest:
      allOf:
        - $ref: '#/components/schemas/OrderUpdateApproveData'
      properties:
        orderDate:
          type: string
          nullable: true
          description: От какого числа рассчитывать заказ (Y-m-d H:i:s)
          example: '23-12-12 12:12:12'
        offer:
          type: array
          items:
            properties:
              offerId:
                allOf:
                  - $ref: '#/components/schemas/OfferId'
              count:
                allOf:
                  - $ref: '#/components/schemas/Count'
            required: [offerId,count]
      required: [terminalId,orderId,offer]

    OrderCreateRequest:
      allOf:
        - $ref: '#/components/schemas/SessionIdRequest'
      properties:
        sessionId:
          nullable: true
        terminalId:
          type: string
          nullable: true
          description: ID терминала
          example: 'terminal_Id'
        tableNumber:
          type: number
          description: номер столика (только для сайта кафе)
          nullable: true
          example: 4
        clientPhone:
          type: string
          nullable: true
          description: Номер телефона клиента, для идентификации клиента при отправке с terminalId
          example: '893781019108'
        appUserId:
          type: string
          nullable: true
          description: Уникальный Id пользователя. Используется при отправке пушей незарегистрированным пользователям
          example: 'uniqId'
        os:
          allOf:
            - $ref: '#/components/schemas/Os'
        version:
          allOf:
            - $ref: '#/components/schemas/Version'
        build:
          allOf:
            - $ref: '#/components/schemas/Build'
        contactData:
          allOf:
            - $ref: '#/components/schemas/ContactData'
          properties:
            smsNotify:
              type: boolean
