          example: '2023-12-12 12:12'
        sum:
          type: number
          description: Общая сумма заказа
          example: 5000
        offer:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/OrderHistoryOfferData'
        contactData:
          allOf:
            - $ref: '#/components/schemas/ContactData'
        orderData:
          allOf:
            - $ref: '#/components/schemas/OrderData'
        delivery:
          allOf:
            - $ref: '#/components/schemas/DeliveryData'
        delivered:
          type: number
