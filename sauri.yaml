      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                action:
                  type: boolean
                  description: Действие подписки (false - отписаться, true - подписаться)
                  nullable: true
                  example: true
              required: [sessionId]
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  /bonus/give:
    post:
      tags: [Bonus]
