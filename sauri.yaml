          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    type: string
                    description: Общая информация о дисконте (HTML)
                    example: 'HTML string'
                required: [error, response]

  /bonus/subscribe:
    post:
      tags: [Bonus]
      summary: 'Подписаться на информирование'
