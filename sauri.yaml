openapi: 3.0.3
info:
  title: 'Sauri LK'
  version: 0.0.3
  x-changelog:
    0.0.3: |
      Добавлены методы Addres, Kladr, Discount, частично Order
    0.0.2: |
      Добавлены методы User
    0.0.1: |
      Первая версия
tags:
  - name: Auth
    description: 'Аутентификация'
  - name: User
    description: 'Профиль пользователя'
  - name: Address
    description: 'Адрес'
  - name: Kladr
    description: 'База адресов kladr'
  - name: Discount
    description: 'Система дисконтов'
  - name: Order
    description: 'Заказы'
  - name: Bonus
    description: 'Бонусы'
  - name: Notify
    description: 'Сервисные методы'
  - name: Delivery
    description: 'Время доставки и самовывоза'
  - name: Service
    description: 'Сервисные методы'
  - name: Payment
    description: 'Онлайн-оплата'
  - name: Push
    description: 'Отправка пушей'

paths:

  #Auth
  /auth/login:
    post:
      tags: [ Auth ]
      summary: 'Авторизация пользователя'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                login:
                  type: string
                  description: Номер телефона
                  example: '7(904) 243 47 32'
                password:
                  type: string
                  description: Пароль или одноразовый пароль
                  example: '438107'
                crypto:
                  properties:
                    hash:
                      type: string
                      description: md5 логин+пароль+соль:sauri_ve8dJp
                      example: '6e4e65b2ce76528f9b02d3b3c663b028'
                    captcha:
                      type: string #??
                      example: ''
                    captchaId:
                      type: string #??
                      example: ''
                  required: [ hash,captcha,captchaId ]
                transactionId:
                  type: string
                  nullable: true
                  description: ID транзакции для одноразового пароля (обязателен если используется одноразовый пароль для входа)
                  example: '22c98a2bdac777958d370cdc0476058c057db363'
                onlyExisted:
                  type: boolean
                  nullable: true
                  description: Только существующие пользователи
                  example: true
              required: [ login,password,crypto ]
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthLoginResponse'

  /auth/logout:
    post:
      tags: [ Auth ]
      summary: 'Выход из системы'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ответ отсутствует

  /auth/passEmailRecover:
    post:
      tags: [ Auth ]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Для запроса восстановления необходимо на данный метод отправить email. Для получения доступа к профилю необходимо прислать все поля.
      summary: 'Восстановление пароля по Email'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPassEmailRecoverRequest'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthPassEmailRecoverResponse'

  /auth/verifyCurrentNumber:
    post:
      tags: [Auth]
      summary: 'Создать защищённую транзакцию для подписи'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthVerifyCurrentNumberResponse'

  /auth/changePassword:
    post:
      tags: [Auth]
      summary: 'Смена пароля'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Метод является защищенным - необходимо иметь идентификатор транзакции и код, для подписи вызова метода. Запрос транзакции выполняется методом - auth.verifyCurrentNumber
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AuthChangePasswordRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthChangePasswordResponse'

  #User
  /user/update:
    post:
      tags: [ User ]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Авторизация пользователя'
      requestBody:
        content:
          application-json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'

  /user/get:
    post:
      tags: [User]
      summary: 'Получение личных данных'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                $ref: '#/components/schemas/UserGetResponse'

  /user/create:
    post:
      tags: [User]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Создание пользователя с терминала'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/UserCreateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserCreateResponse'

  /user/updateEmail:
    post:
      tags: [User]
      summary: 'Обновление пользовательского email'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                email:
                  allOf:
                    - $ref: '#/components/schemas/Email'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                allOf:
                  - $ref: '#/components/schemas/UserData'

  /user/checkUpdates:
    post:
      tags: [User]
      summary: 'Проверка наличия новой версии приложения'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/UserCheckUpdatesRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserCheckUpdatesResponse'

  /user/applyPromocode:
    post:
      tags: [User]
      summary: 'Применение промокода к заказу'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/UserApplyPromocodeRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserApplyPromocodeResponse'

  /user/updateNotificationStatus:
    post:
      tags: [User]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Обновление статуса подписки на пуши'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
                - $ref: '#/components/schemas/UserUpdateNotificationStatusRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserUpdateNotificationStatusResponse'

  /user/deleteAccount:
    post:
      tags: [User]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Удаление аккаунта'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                hash:
                  type: string
                  description: MD5 Hash от sessionId+salt
                  example: 'hash'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  #Address
  /address/update:
    post:
      tags: [Address]
      summary: 'Создание/обновление адреса'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. для обновления адреса необходимо присылать ID адреса, для создания только поля addressProps.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AddressUpdateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AddressUpdateResponse'

  /address/delete:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Удаление адреса'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                addressId:
                  allOf:
                    - $ref: '#/components/schemas/AddressId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /address/list:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Получение списка адресов'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/AddressData'
                      properties:
                        id:
                          allOf:
                            - $ref: '#/components/schemas/AddressId'

  /address/get:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Получение конкретного адреса'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                addressId:
                  allOf:
                    - $ref: '#/components/schemas/AddressId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    allOf:
                      - $ref: '#/components/schemas/AddressData'
                    properties:
                      addressId:
                        allOf:
                          - $ref: '#/components/schemas/AddressId'

  /address/getBar:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Получение бара по адресу'
      requestBody:
        content:
          application-json:
            schema:
              properties:
                lat:
                  allOf:
                    - $ref: '#/components/schemas/Lat'
                lng:
                  allOf:
                    - $ref: '#/components/schemas/Lng'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    properties:
                      title:
                        type: string
                        description: название зоны
                        example: 'zone_name'

  /address/find:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Поиск полного адреса по строке'
      requestBody:
        content:
          application-json:
            schema:
              properties:
                cityId:
                  allOf:
                    - $ref: '#/components/schemas/CityId'
                address:
                  type: string
                  description: Строка с адресом
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AddressFindResponse'

  /address/geocode:
    post:
      tags: [Address]
      summary: 'Обратный геокодинг координат в адрес'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Метод позволяет получить название улицы и номер дома по координатам в рамках текущего города.
      requestBody:
        content:
          application-json:
            schema:
              properties:
                lat:
                  allOf:
                    - $ref: '#/components/schemas/Lat'
                lng:
                  allOf:
                    - $ref: '#/components/schemas/Lng'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AddressGeocodeResponse'

  /address/getZones:
    get:
      tags: [Address]
      summary: 'Получение зон доставки баров со статусами'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AddressGetZonesResponse'

  /address/updateZoneStatus:
    post:
      tags: [Address]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      summary: 'Обновление статуса зоны'
      requestBody:
        content:
          application-json:
            schema:
              properties:
                bar:
                  allOf:
                    - $ref: '#/components/schemas/Bar'
                num:
                  allOf:
                    - $ref: '#/components/schemas/Num'
                new_status:
                  allOf:
                    - $ref: '#/components/schemas/Status'

      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  #Kladr
  /kladr/get:
    post:
      tags: [Kladr]
      summary:  'Получение адреса'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              properties:
                kladrId:
                  type: string
                  description: ID в базе КЛАДР
                  example: '1234567890'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    properties:
                      street_name:
                        type: string
                        description: Название улицы
                        example: 'treet_name'
                      street_id:
                        type: string
                        description: ID в базе КЛАДР
                        example: 'street_id'
                      city:
                        allOf:
                          - $ref: '#/components/schemas/CityId'

  #Discount
  /descount/get:
    post:
      tags: [Discount]
      summary: 'Получение данных о дисконте пользователя'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DiscountGetResponse'

  /discount/check:
    post:
      tags: [Discount]
      summary: 'Привязка дисконта, если совпадает номер телефона'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. в случае успешной привязки дисконта вернёт информацию о текущем статусе клиента и дополнительной информацией (userData). В случае, если необходимо подтвердить номер по СМС вернёт ID транзакции (без ошибки).
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                discountId:
                  allOf:
                    - $ref: '#/components/schemas/DiscountId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DiscountCheckResponse'

  /discount/verify:
    post:
      tags: [Discount]
      summary: 'Привязка дисконта: подтверждение по смс'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                transactionId:
                  type: string
                  nullable: true
                  description: ID транзакции
                  example: '12345678'
                discountId:
                  allOf:
                    - $ref: '#/components/schemas/DiscountId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    allOf:
                      - $ref: '#/components/schemas/UserData'

  /discount/create:
    post:
      tags: [Discount]
      summary: 'Заявка на создание дисконта'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  discountId:
                    allOf:
                      - $ref: '#/components/schemas/DiscountId'

  /discount/bind:
    post:
      tags: [Discount]
      summary: 'Привязка существующий дисконта'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                discountId:
                  allOf:
                    - $ref: '#/components/schemas/DiscountId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /discount/unbind:
    post:
      tags: [Discount]
      summary: 'Отвязка дисконта'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /discount/bindByTerminal:
    post:
      tags: [Discount]
      summary: 'Привязка дисконта с терминала'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                discountId:
                  allOf:
                    - $ref: '#/components/schemas/DiscountId'
                clientId:
                  type: string
                  description: Номер телефона клиента
                  example: '89378101908'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  #Order
  /order/historyNew:
    post:
      tags: [Order]
      summary: 'История заказов'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                dateFrom:
                  type: string
                  nullable: true
                  description: Дата начала выборки dd.mm.YY
                  example: '01.01.2023'
                dateTo:
                  type: string
                  nullable: true
                  description: Дата конца выборки dd.mm.YY
                  example: '12.12.2023'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OrderHistoryResponse'

  /order/update:
    post:
      tags: [Order]
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Аналогичен методу order.approve, за исключением подтверждения заказа и его отмены. Если не указывать сумму заказа или бонусов, будет использоваться количество из первоначальных данных. При передачи 0 в сумму заказа, поле будет проигнорировано. Если баллов будет указано больше допустимого, вернёт ошибку БЕЗ обновления заказа.
      summary: 'Изменение информации о заказе'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderUpdateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /order/approve:
    post:
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. 1) Если не указывать сумму заказа или бонусов, будет использоваться количество из первоначальных данных. Если в сумму будет передан 0, сработает функционал отмены заказа. 2) Блок offer не обязателен. Но если его передать пустым, состав заказа удалится. Блок работает полностью заменяя состав заказа, т.е. заказ необходимо прислать полностью, если нужны изменения.
      tags: [Order]
      summary: 'Подтверждение заказа'
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderApproveRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /order/cancel:
    post:
      tags: [Order]
      summary: 'Отмена заказа'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              properties:
                terminalId:
                  allOf:
                    - $ref: '#/components/schemas/TerminalId'
                orderId:
                  allOf:
                    - $ref: '#/components/schemas/OrderId'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /order/create:
    post:
      tags: [Order]
      summary: 'Создание заказа'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST || Метод также актуален для незарегистрированных пользователей. Поле data.delivery.userAddress используется в случае,  когда не указан ID адреса (addressID имеет высший приоритет). Все правила обработки скидок будет происходить в закрытом API по мере их приоритета и правил. В случае, если у пользователь не завершил регистрацию, баллы не будут списываться (для app, web и terminal). .
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OrderCreateResponse'

  /order/feedback:
    post:
      tags: [Order]
      summary: 'Контроль качества'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data" и массивом "images", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderFeedBackRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  /order/rate:
    post:
      tags: [Order]
      summary: 'Оценка заказа'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderRateRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'

  /order/promo:
    post:
      tags: [Order]
      summary: 'Переход по промо-ссылке оценки заказа'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Вызывается при каждом переходе по внешней ссылке, передаваемой в доп. данных пуша оценки заказа.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderPromoRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  /order/isPromocodeValid:
    post:
      tags: [Order]
      summary: 'Проверка промокода'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. кассир-оператор создает заказ, вводит промокод, мы запрашиваем у апи валидацию, если всë ок добавляем блюдо и промокод к заказу
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/OrderIsPromocodeValidRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  /order/unratedInfo:
    post:
      tags: [Order]
      summary: 'Получение данных о заказе, требующего отзыва'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Сделанный заказ должен попадать в это АПИ одновременно с отправкой пуша об оценке этого заказа, а исчезать - после оценки заказа (или отказа от оценки заказа) с помощью АПИ order.rate. Приложение будет предлагать оценить этот заказ каждый раз после запуска до тех пор пока АПИ возвращает в данном АПИ информацию о заказе.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                sessionId:
                  nullable: true
                userId:
                  type: string
                  nullable: true
                  description: D пользователя
                  example: 'user_id'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OrderUnratedInfoResponse'

  #Bonus
  /bonus/getList:
