          example: 0
        pay:
          allOf:
            - $ref: '#/components/schemas/PayData'
      required: [orderId,date,sum,offer,contactData,orderData,delivery,delivered,pay]
    OrderHistoryDataNew:
      oneOf:
        - $ref: '#/components/schemas/info'
        - $ref: '#/components/schemas/discount'
      properties:
