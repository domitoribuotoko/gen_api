      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/BonusGiveRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  /bonus/history:
    post:
      tags: [Bonus]
      summary: 'История бонусов'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                fromDate:
                  type: string
                  description: Выбрать с даты формат YYYY-MM-DD
                  nullable: true
                  example: '2023-12-12'
              required: [sessionId]
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BonusHistoryResponse'

  #Notify
  /notify/all:
    post:
      tags: [Notify]
      summary: 'Получение всех уведомлений'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. Вне зависимости от указанного лимита сообщения, в коллекцию будут добавлены все новые уведомления. По сути лимит влияет на прочитанные сообщения.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
                limit:
                  type: string
                  nullable: true
                  description: Лимит непрочитанных сообщений
                  example: '42'
              required: [sessionId]
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/NotifyAllResponse'

  /notify/checkAll:
    post:
      tags: [Notify]
      summary: 'Отметить все уведомления прочитанными'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              required: [sessionId]
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  # /notify/create:

  #Delivery
  /deliveryTime/get:
    post:
      tags: [Delivery]
      summary: 'Получение времени'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST. При указании города будет просчитываться время доставки, при указании города и бара будет рассчитываться время приготовления (в приготовлении максимальное не используется и будет равно среднему). Адрес доставки может передаваться как в виде текста, так и в виде геокоординат. Если указаны геокоординаты, то текст адреса игнорируется.

      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/DeliveryTimeGetRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/DeliveryTimeGetResponse'

  /deliveryTime/set:
    post:
      tags: [Delivery]
      summary: 'Установка параметров'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/DeliveryTimeSetRequest'
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                required: [error]

  #Service
  /sevice/generateTerminalId:
    post:
      tags: [Service]
      summary: 'Авторизация пользователя'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              properties:
                seviceToken:
                  type: string
                  description: ID транзакции для одноразового пароля
                  example: 'id'
              required: [seviceToken]
      responses:
        200:
          description: ''
          content:
            application-json:
              schema:
                properties:
                  error:
                    allOf:
                      - $ref: '#/components/schemas/Error'
                  response:
                    properties:
                      terminalId:
                        allOf:
                          - $ref: '#/components/schemas/TerminalId'
                    required: [terminalId]
                required: [error,response]

  /service/getOrderStatus:
    post:
      tags: [Service]
      summary: 'Получении и обновление статуса оплаты после совершения платежа'
      description: Тип запроса - multipart/formdata с JSON-обьектом в параметре "data", а не RAW POST.
      requestBody:
        content:
          application-json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SessionIdRequest'
              properties:
